version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests

  mockserver:
    image: alpine/socat
    command: socat TCP-LISTEN:5000,fork EXEC:"echo 'Hello from Mock Server'"
    ports:
      - "5000:5000"