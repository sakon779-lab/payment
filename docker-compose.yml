version: '3.9'

services:
  api:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

  mockserver:
    image: mockserver/mockserver:5.14.0
    ports:
      - "1080:1080"